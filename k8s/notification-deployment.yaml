apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: 911540681555.dkr.ecr.eu-central-1.amazonaws.com/notification-service:latest
          ports:
            - containerPort: 8082